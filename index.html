<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <link rel="stylesheet" href="style/style.css">
    </head>
    <body>
        <header>
            <div class="container">
                <h1>Where in the world?</h1>
                <button>
                    <img src="" alt="">
                    Dark Mode
                </button>
            </div>
        </header>
        <main>
            <div class="container">
                <div class="navigation-country">
                    <input class="navigation-country__search" type="text" placeholder="Search for a country...">
                    <select class="navigation-country__filter" name="regions" id="filter-by-region">
                        <option value="Filter by Region">Filter by Region</option>
                        <option value="Africa">Africa</option>
                        <option value="America">America</option>
                        <option value="Asia">Asia</option>
                        <option value="Europe">Europe</option>
                        <option value="Oceania">Oceania</option>
                    </select>
                </div>
                <div class="country-list">
                    <section class="country">
                        <div class="country__flag">
                            <img src="germany.png" alt="">
                        </div>
                        <div class="country__info">
                            <h2 class="country__name">Germany</h2>
                            <p class="country__population"><span>Population:</span> 81,770,900</p>
                            <p class="country__region"><span>Region:</span> Europe</p>
                            <p class="country__capital"><span>Capital:</span> Berlin</p>
                        </div>
                    </section>
                </div>
            </div>
        </main>
    </body>
</html>
